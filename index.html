
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scroll Fade Banner</title>

<style>
  body {
    margin: 0;
    height: 2000px;
  }

  /* Banner container */
  .banner {
    position: relative;
    height: 980px;
  }

  /* Fixed layer */
  .banner-inner {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 980px;
    overflow: hidden;
  }

  /* Background images */
  .image1, .image2 {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: top center;
    transition: opacity 0.6s ease;
  }

  .image1 {
    background-image: url('https://tandemcarers.org.au/images/2026%20Election/20260527%20FN%20family%20blur%20full%20width.png');
    z-index: 1;
  }

  .image2 {
    background-image: url('https://tandemcarers.org.au/images/2026%20Election/20260527%20FN%20family%20unblur%20full%20width.png');
    opacity: 0;
    z-index: 2;
  }

  /* Overlay image */
  .overlay {
    position: absolute;
    top: 50%;
    left: 25%;
    transform: translateY(-50%);
    width: 40%;
    opacity: 0;
    z-index: 3;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .overlay img {
    width: 100%;
    display: block;
  }

  /* ✅ Tablet */
  @media (max-width: 768px) {
    .overlay {
      width: 75%;
      left: 12.5%;
      top: 55%;
    }
  }

  /* ✅ Small mobile */
  @media (max-width: 480px) {
    .overlay {
      width: 90%;
      left: 5%;
      top: 55%;
    }
  }

</style>
</head>

<body>

<div class="banner">
  <div class="banner-inner">
    <div class="image1"></div>
    <div class="image2" id="img2"></div>

    <div class="overlay" id="overlay">
      <img src="https://tandemcarers.org.au/images/2026%20Election/260527%20In%20the%20picture%20text%20grey%20background.png" alt="">
    </div>
  </div>
</div>

<script>
window.addEventListener("scroll", function () {

  const img2 = document.getElementById("img2");
  const overlay = document.getElementById("overlay");

  // Adjust speed of scroll effect
  const progress = window.scrollY / 800;

  // Fade timing: 25% → 75%
  let opacity = Math.min(Math.max((progress - 0.25) / 0.5, 0), 1);

  img2.style.opacity = opacity;
  overlay.style.opacity = opacity;

  // Optional subtle lift animation
  overlay.style.transform = `translateY(${ -50 + (opacity * -5) }%)`;

});
</script>

</body>
</html>
``
