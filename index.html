
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scroll Fade Banner</title>

<style>
  body {
    margin: 0;
  }

  /* ✅ Banner controls animation space */
  .banner {
    height: 1500px; /* controls scroll length */
    position: relative;
  }

  /* ✅ Sticky container */
  .banner-inner {
    position: sticky;
    top: 0;
    height: 980px;
    overflow: hidden;
  }

  /* Images */
  .image1, .image2 {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: top center;
    transition: opacity 0.3s linear;
  }

  .image1 {
    background-image: url('https://tandemcarers.org.au/images/2026%20Election/20260527%20FN%20family%20blur%20full%20width.png');
    z-index: 1;
  }

  .image2 {
    background-image: url('https://tandemcarers.org.au/images/2026%20Election/20260527%20FN%20family%20unblur%20full%20width.png');
    opacity: 0;
    z-index: 2;
  }
