
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Test Banner</title>

<style>
  body {
    margin: 0;
    height: 2000px;
  }

  .banner {
    position: relative;
    height: 980px;
  }

  .banner-inner {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 980px;
  }

  .image1, .image2 {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
  }

  .image1 {
    background-image: url('https://tandemcarers.org.au/images/2026%20Election/20260527%20FN%20family%20blur%20full%20width.png');
    z-index: 1;
  }

  .image2 {
    background-image: url('https://tandemcarers.org.au/images/2026%20Election/20260527%20FN%20family%20unblur%20full%20width.png');
    opacity: 0;
    z-index: 2;
  }

  .overlay {
    position: absolute;
    top: 50%;
    left: 25%;
    transform: translateY(-50%);
    width: 40%;
    opacity: 0;
    z-index: 3;
  }

  .overlay img {
    width: 100%;
  }
</style>
</head>

<body>

<div class="banner">
  <div class="banner-inner">
    <div class="image1"></div>
    <div class="image2" id="img2"></div>

    <div class="overlay" id="overlay">
      <img src="https://tandemcarers.org.au/images/2026%20Election/260527%20In%20the%20picture%20text%20grey%20background.png">
    </div>
  </div>
</div>

<script>
window.addEventListener("scroll", function () {
  const img2 = document.getElementById("img2");
  const overlay = document.getElementById("overlay");

  const progress = window.scrollY / 1500;

  const opacity = Math.min(Math.max((progress - 0.25) / 0.5, 0), 1);

  img2.style.opacity = opacity;
  overlay.style.opacity = opacity;
});
</script>

</body>
</html>
