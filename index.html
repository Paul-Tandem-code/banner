
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scroll Fade Banner</title>

<style>
  body {
    margin: 0;
  }

  /* ✅ This container creates INTERNAL scroll */
  .scroll-container {
    height: 2000px;
    position: relative;
  }

  /* Sticky banner */
  .banner {
    position: sticky;
    top: 0;
    height: 980px;
    overflow: hidden;
  }

  /* Images */
  .image1, .image2 {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: top center;
    transition: opacity 0.3s linear;
  }

  .image1 {
    background-image: url('https://tandemcarers.org.au/images/2026%20Election/20260527%20FN%20family%20blur%20full%20width.png');
    z-index: 1;
  }

  .image2 {
    background-image: url('https://tandemcarers.org.au/images/2026%20Election/20260527%20FN%20family%20unblur%20full%20width.png');
    opacity: 0;
    z-index: 2;
  }

  /* Overlay */
  .overlay {
    position: absolute;
    top: 55%;
    left: 25%;
    transform: translateY(-50%);
    width: 40%;
    opacity: 0;
    z-index: 3;
    transition: opacity 0.3s linear, transform 0.3s ease;
  }

  .overlay img {
    width: 100%;
  }

  @media (max-width: 768px) {
    .overlay {
      width: 75%;
      left: 12.5%;
    }
  }

  @media (max-width: 480px) {
    .overlay {
      width: 90%;
      left: 5%;
    }
  }

</style>
</head>

<body>

<div class="scroll-container" id="container">

  <div class="banner" id="banner">
    <div class="image1"></div>
    <div class="image2" id="img2"></div>

    <div class="overlay" id="overlay">
      <img src="https://tandemcarers.org.au/images/2026%20Election/260527%20In%20the%20picture%20text%20grey%20background.png">
    </div>
  </div>

</div>

<script>
window.addEventListener("scroll", function () {

  const container = document.getElementById("container");
  const img2 = document.getElementById("img2");
  const overlay = document.getElementById("overlay");

  const rect = container.getBoundingClientRect();

  const totalScroll = container.offsetHeight - window.innerHeight;

  // ✅ Scroll progress INSIDE the container
  let progress = Math.min(Math.max(-rect.top / totalScroll, 0), 1);

  // ✅ Delay to ~50%
  let raw = Math.min(Math.max((progress - 0.5) / 0.5, 0), 1);

  // ✅ Easing
  let eased = raw < 0.5
    ? 2 * raw * raw
    : 1 - Math.pow(-2 * raw + 2, 2) / 2;

  img2.style.opacity = eased;
  overlay.style.opacity = eased;

  overlay.style.transform = `translateY(${ -50 + (eased * -5) }%)`;

});
</script>

</body>
</html>
