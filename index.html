
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scroll Fade Banner</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 2000px;
  }

  .banner {
    position: relative;
    height: 980px;
    width: 100%;
  }

  .banner-inner {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 980px;
    overflow: hidden;
  }

  .image {
    position: absolute;
    width: 100%;
    height: 100%;
    left: 0;
    top: 0;
    background-size: cover;
    background-position: center;
    transition: opacity 0.3s ease;
  }

  .image1 {
    background-image: url('https://tandemcarers.org.au/images/2026%20Election/20260527%20FN%20family%20blur%20full%20width.png');
    opacity: 1;
    z-index: 1;
  }

  .image2 {
    background-image: url('https://tandemcarers.org.au/images/2026%20Election/20260527%20FN%20family%20unblur%20full%20width.png');
    opacity: 0;
    z-index: 2;
  }

  /* ✅ Fixed overlay image */
  .overlay-image {
    position: absolute;
    top: 50%;
    left: 25%;
    transform: translateY(-50%);
    z-index: 3;
    opacity: 0;
    transition: opacity 0.5s ease;
    width: 40%;
  }

  .overlay-image img {
    width: 100%;
    height: auto;
    display: block;
  }
</style>
</head>

<body>

<div class="banner">
  <div class="banner-inner">
    <div class="image image1"></div>
    <div class="image image2"></div>

    <!-- ✅ FIXED IMAGE TAG -->
    <div class="overlay-image">
      <img src="https://tandemcarers.org.au/images/2026%20Election/260527%20In%20the%20picture%20text%20grey%20background.png" alt="Overlay text">
    </div>

  </div>
</div>

<script>
window.addEventListener("scroll", function () {

  const img2 = document.querySelector(".image2");
  const overlay = document.querySelector(".overlay-image");

  const scrollTop = window.scrollY;
  const scrollHeight = document.body.scrollHeight - window.innerHeight;

  let progress = scrollTop / scrollHeight;

  const fadeStart = 0.25;
  const fadeEnd = 0.75;

  let opacity;

  if (progress < fadeStart) {
    opacity = 0;
  } else if (progress > fadeEnd) {
    opacity = 1;
  } else {
    opacity = (progress - fadeStart) / (fadeEnd - fadeStart);
  }

  img2.style.opacity = opacity;
  overlay.style.opacity = opacity;

});
</script>

</body>
</html>
