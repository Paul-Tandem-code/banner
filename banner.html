srcdoc="
<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; }
  .banner {
    position: sticky;
    top: 0;
    height: 300px;
    overflow: hidden;
  }
  .image {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    transition: opacity 0.2s linear;
  }
  .image1 {
    background-image: url(https://tandemcarers.org.au/images/2026%20Election/20260527%20FN%20family%20blur%20full%20width.png);
    opacity: 1;
    z-index: 1;
  }
  .image2 {
    background-image: url(https://tandemcarers.org.au/images/2026%20Election/20260527%20FN%20family%20unblur%20full%20width.png);
    opacity: 0;
    z-index: 2;
  }
  .content {
    height: 2000px;
  }
</style>
</head>
<body>
<div class='banner'>
  <div class='image image1'></div>
  <div class='image image2'></div>
</div>
<div class='content'></div>
<script>
window.addEventListener('scroll', function () {
  const banner = document.querySelector('.banner');
  const img2 = document.querySelector('.image2');
  if (!banner || !img2) return;
  const progress = Math.min(
    Math.max((window.scrollY - banner.offsetTop) / banner.offsetHeight, 0),
    1
  );
  img2.style.opacity = progress;
});
</script>
</body>
</html>
