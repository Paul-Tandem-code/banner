
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scroll Fade Banner</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 2000px; /* ✅ creates scroll */
  }

  /* ✅ Banner container */
  .banner {
    position: relative;
    height: 980px;
    width: 100%;
  }

  /* ✅ Fixed layer (acts like sticky) */
  .banner-inner {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 980px;
    overflow: hidden;
  }

  /* Images */
  .image {
    position: absolute;
    width: 100%;
    height: 100%;
    left: 0;
    top: 0;
    background-size: cover;
    background-position: center;
    transition: opacity 0.3s ease;
  }

  .image1 {
    background-image: url('https://tandemcarers.org.au/images/2026%20Election/20260527%20FN%20family%20blur%20full%20width.png');
    opacity: 1;
    z-index: 1;
  }

  .image2 {
    background-image: url('https://tandemcarers.org.au/images/2026%20Election/20260527%20FN%20family%20unblur%20full%20width.png');
    opacity: 0;
    z-index: 2;
  }
</style>
</head>

<body>

<div class="banner" id="banner">
  <div class="banner-inner">
    <div class="image image1"></div>
    <div class="image image2"></div>
  </div>
</div>

<script>
window.addEventListener("scroll", function () {

  const banner = document.getElementById("banner");
  const img2 = document.querySelector(".image2");

  const rect = banner.getBoundingClientRect();

  // ✅ Fade ONLY while banner is in viewport
  const start = window.innerHeight;
  const end = -980;

  let progress = (start - rect.top) / (start - end);

  // Clamp 0–1
  progress = Math.max(0, Math.min(progress, 1));

  img2.style.opacity = progress;

});
</script>

</body>
</html>
